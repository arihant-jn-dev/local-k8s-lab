# Redis Deployment + Service. Simpler than Postgres - no PVC, since it's
# fine for our job queue to lose its (in-progress, non-critical) contents
# if the Pod restarts. In production you might still persist Redis, but
# for this learning project an ephemeral queue is an acceptable trade-off.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: local-k8s-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: local-k8s-lab
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  # ClusterIP (the default) again - Redis should only be reachable from
  # inside the cluster, never from outside.
