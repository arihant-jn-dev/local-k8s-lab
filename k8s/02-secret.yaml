# A Secret is structurally almost identical to a ConfigMap, but Kubernetes
# treats it differently: values are base64-encoded (NOT encrypted - just
# encoded, so don't confuse this with real security) and Kubernetes avoids
# printing Secret values in places like `kubectl describe`. In a real
# production cluster you'd also enable encryption-at-rest and tighter RBAC
# for Secrets - we skip that here since this is local-only and the spec
# explicitly says no real security hardening.
#
# type: Opaque means "just arbitrary key-value data" - the most generic
# Secret type, as opposed to specialized types like
# kubernetes.io/tls or kubernetes.io/dockerconfigjson.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: local-k8s-lab
type: Opaque
data:
  # Values here MUST be base64-encoded (not plaintext) - Kubernetes does
  # not encode them for you. Generated with: echo -n "appuser" | base64
  PGUSER: YXBwdXNlcg==
  PGPASSWORD: YXBwcGFzc3dvcmQ=
